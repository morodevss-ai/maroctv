name: MarocTV - Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create android/local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME"   >> android/local.properties
      - name: pub get
        run: flutter pub get
      - name: Build Universal APK
        run: flutter build apk --release --no-tree-shake-icons
      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: MarocTV-Universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: MarocTV-arm64-modern-phones
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
