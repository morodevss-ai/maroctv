name: MarocTV - Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter 3.22.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME"   >> android/local.properties

      - name: Generate launcher icons
        run: |
          python3 - << 'PYEOF'
          import struct, zlib, os

          def make_png(size, r, g, b):
              def chunk(tag, data):
                  crc = zlib.crc32(tag + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', crc)
              raw = b''.join(b'\x00' + bytes([r, g, b] * size) for _ in range(size))
              return (b'\x89PNG\r\n\x1a\n'
                      + chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
                      + chunk(b'IDAT', zlib.compress(raw))
                      + chunk(b'IEND', b''))

          icons = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }
          base = 'android/app/src/main/res'
          for folder, size in icons.items():
              path = os.path.join(base, folder)
              os.makedirs(path, exist_ok=True)
              png = make_png(size, 200, 16, 46)
              for name in ('ic_launcher.png', 'ic_launcher_round.png'):
                  open(os.path.join(path, name), 'wb').write(png)
              print(f'✓ {folder} ({size}x{size})')
          PYEOF

      - name: pub get
        run: flutter pub get

      - name: Patch better_player namespace
        run: |
          GRADLE=$(find ~/.pub-cache -name "build.gradle" -path "*/better_player*/android/build.gradle" 2>/dev/null | head -1)
          if [ -n "$GRADLE" ] && ! grep -q "namespace" "$GRADLE"; then
            sed -i 's/android {/android {\n    namespace "com.jhomlala.better_player"/' "$GRADLE"
            echo "✓ Patched better_player: $GRADLE"
          else
            echo "✓ better_player already ok or not found"
          fi

      - name: Build Universal APK
        run: flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons --android-skip-build-dependency-validation

      - name: List APKs
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: MarocTV-Universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: MarocTV-arm64-modern-phones
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload armeabi APK
        uses: actions/upload-artifact@v4
        with:
          name: MarocTV-armeabi-old-phones
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
