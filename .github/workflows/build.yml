name: MarocTV - Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: pub get
        run: flutter pub get

      - name: Build APK (universal - all phones)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build APKs (split per arch)
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: List APKs
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload - Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: MarocTV-Universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload - arm64 APK (modern phones)
        uses: actions/upload-artifact@v4
        with:
          name: MarocTV-arm64-modern-phones
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload - armeabi APK (old phones)
        uses: actions/upload-artifact@v4
        with:
          name: MarocTV-armeabi-old-phones
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
